name: Release Desktop Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_name: windows
            artifact_name: codex-switch-windows
            archive_path: dist/codex-switch-windows.zip
          - os: macos-latest
            platform_name: macos
            artifact_name: codex-switch-macos
            archive_path: dist/codex-switch-macos.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.platform_name == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup conda Python for macOS
        if: matrix.platform_name == 'macos'
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: codex-switch-build
          python-version: "3.12"
          channels: conda-forge
          channel-priority: strict

      - name: Verify Tkinter
        if: matrix.platform_name == 'windows'
        run: |
          python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Verify Tkinter on macOS
        if: matrix.platform_name == 'macos'
        shell: bash -el {0}
        run: |
          python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Install PyInstaller
        if: matrix.platform_name == 'windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install PyInstaller on macOS
        if: matrix.platform_name == 'macos'
        shell: bash -el {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build Desktop Package
        if: matrix.platform_name == 'windows'
        run: |
          pyinstaller --noconfirm --clean 'CODEX切换器.spec'

      - name: Build Desktop Package on macOS
        if: matrix.platform_name == 'macos'
        shell: bash -el {0}
        run: |
          pyinstaller --noconfirm --clean 'CODEX切换器.spec'

      - name: Pack Windows release asset
        if: matrix.platform_name == 'windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'dist/CODEX切换器/CODEX切换器.exe')) {
            throw '未找到 Windows EXE 输出'
          }
          Compress-Archive -Path 'dist/CODEX切换器/*' -DestinationPath 'dist/codex-switch-windows.zip' -Force

      - name: Pack macOS release asset
        if: matrix.platform_name == 'macos'
        shell: bash
        run: |
          test -d "dist/CODEX切换器.app"
          ditto -c -k --sequesterRsrc --keepParent "dist/CODEX切换器.app" "dist/codex-switch-macos.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
